<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page introuvable | Clinique Santé IPS</title>
<script>
// Redirection automatique des anciennes URLs Wix vers les nouvelles pages GitHub
(function() {
  var path = window.location.pathname.toLowerCase();
  var destination = '/'; // Par défaut → accueil

  // Anciennes URLs Wix → nouvelles pages GitHub
  var redirects = {
    '/nous-contacter':     '/contact.html',
    '/contact':            '/contact.html',
    '/la-clinique':        '/index.html#clinique',
    '/nos-services':       '/index.html#services',
    '/nos-services-1':     '/index.html#services',
    '/l-equipe':           '/equipe.html',
    '/equipe':             '/equipe.html',
    '/tarifs':             '/tarifs.html',
    '/faq':                '/index.html#faq',
    '/fonctionnement':     '/index.html#fonctionnement',
    '/politique-de-confidentialite': '/confidentialite.html',
    '/confidentialite':    '/confidentialite.html',
    '/prendre-rendez-vous': '/rdv.html',
    '/rendez-vous':        '/rdv.html',
    '/rdv':                '/rdv.html',
  };

  // Chercher une correspondance
  for (var old in redirects) {
    if (path === old || path.indexOf(old) === 0) {
      destination = redirects[old];
      break;
    }
  }

  // Rediriger
  window.location.replace(destination);
})();
</script>

</style>
